lines, deploys models to production, and operationalises analytics solutions with data scientists and engineers. It fits the candidate because he already ships multimodal systems end to end at Huawei, including deployment, evaluation, and production-style inference pipelines. The domain looks more business-ML than frontier multimodal AI, so the fit is adjacent rather than signature-level.", "llm_fit": 2, "category": "industry", "is_active": 1, "last_seen": "2026-07-06", "last_checked": "2026-07-06", "expired_on": null, "restored_on": null, "first_seen": "2026-06-02", "emailed_on": "2026-06-02"}, {"id": "ashby-Faculty-fd216949-66f6-4258-9e52-f2067503b75f", "url": "https://jobs.ashbyhq.com/Faculty/fd216949-66f6-4258-9e52-f2067503b75f", "title": "Data Scientist", "employer": "Faculty", "department": "Defence", "location": "UK - Remote", "salary": "", "posted_date": "", "closing_date": "", "snippet": "WHY FACULTY? We established Faculty in 2014 because we thought that AI would be the most important technology of our time. Since then, we’ve worked with over 350 global customers to transform their performance through human-centric AI. You can read about our real-world impact here https://faculty.ai/impact. We don’t chase hype cycles. We innovate, build and deploy responsible AI which moves the needle - and we know a thing or two about doing it well. We bring an unparalleled depth of technical, product and delivery expertise to our clients who span government, finance, retail, energy, life sciences and defence. Our business, and reputation, is growing fast and we’re always on the lookout for individuals who share our intellectual curiosity and desire to build a positive legacy through technology. AI is an epoch-defining technology, join a company where you’ll be empowered to envision its most powerful applications, and to make them happen. ABOUT THE TEAM Our Defence team is focused on building and embedding human-centered AI solutions which give our nation a competitive ed ve filter favors AI/ML research.", "llm_summary": "DeepMind's Frontier Safety Risk Assessment team seeks a Research Engineer (MTS) to design and validate approaches for assessing risks from frontier AI systems. the candidate's foundation-model expertise and GRPO (RL for retrieval) algorithms are adjacent to safety research methodologies; permissive filtering favors wide net on AI/ML research roles.", "llm_fit": 2, "category": "industry", "is_active": 1, "last_seen": "2026-06-25", "last_checked": "2026-07-06", "expired_on": null, "restored_on": null, "first_seen": "2026-05-11", "emailed_on": null}];
const EXPIRED = [];
const TODAY = new Date("2026-07-10T00:00:00");

function parseDate(s) { if (!s) return null;
  const d = new Date(s + "T00:00:00"); return isNaN(d) ? null : d; }
function daysUntil(d) { return Math.round((d - TODAY) / 86400000); }
function daysSince(d) { return Math.round((TODAY - d) / 86400000); }
function stars(n) { n = Math.max(0, Math.min(5, n|0));
  return "★".repeat(n) + "☆".repeat(5 - n); }
function esc(s) { if (!s) return ""; return String(s).replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function sourceLinks(j) {
  let sources = [];
  try { sources = JSON.parse(j.source_urls_json || "[]"); } catch (_) { sources = []; }
  if (!Array.isArray(sources)) sources = [];
  if (!sources.length && j.source_name) sources = [{name: j.source_name, url: j.source_url || ""}];
  return sources.filter(s => (s.name || s.url));
}

function sourceHtml(j) {
  const sources = sourceLinks(j);
  if (!sources.length) return "";
  return `<div class="meta-icons">Found via ${
    sources.slice(0, 5).map(s => s.url
      ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name || "source")}</a>`
      : esc(s.name || "source")).join(" · ")
  }</div>`;
}

function isNew(postedIso) {
  if (!postedIso) return false;
  const d = parseDate(postedIso);
  if (!d) return false;
  return (TODAY - d) / 86400000 <= 3;
}

function freshnessBadge(j) {
  const d = parseDate(j.posted_date);
  if (!d) return {num: "·", label: "seen", cls: "stale"};
  const age = Math.max(0, daysSince(d));
  return {
    num: age === 0 ? "new" : `${age}d`,
    label: age === 0 ? "" : age <= 3 ? "fresh" : age <= 7 ? "recent" : age <= 14 ? "active" : "seen",
    cls: age <= 3 ? "fresh" : age <= 7 ? "safe" : age <= 14 ? "warn" : "stale",
  };
}

function renderCard(j, isExpired) {
  const cd = parseDate(j.closing_date);
  const days = cd ? daysUntil(cd) : null;
  let sev = "", cdLabel = "";
  if (isExpired) {
    sev = "expired";
    cdLabel = j.closing_date || "—";
  } else if (days === null) {
    const fresh = freshnessBadge(j);
    sev = fresh.cls;
    cdLabel = "—";
  } else if (days <= 7) {
    sev = "";
    cdLabel = `${days}d`;
  } else if (days <= 14) {
    sev = "warn";
    cdLabel = `${days}d`;
  } else {
    sev = "safe";
    cdLabel = `${days}d`;
  }
  const itemNew = !isExpired && isNew(j.posted_date);
  const newBadge = itemNew ? '<span class="new-badge">NEW!</span>' : "";

  const metaBits = [];
  if (j.location) metaBits.push(`📍 ${esc(j.location)}`);
  if (j.salary) metaBits.push(`💷 ${esc(j.salary)}`);
  if (j.posted_date) metaBits.push(`📅 Posted ${esc(j.posted_date)}`);
  if (j.closing_date) metaBits.push(`⏳ Closes ${esc(j.closing_date)}`);
  if (j.last_seen) metaBits.push(`👁 Last seen ${esc(j.last_seen)}`);
  if (j.expired_on) metaBits.push(`Closed ${esc(j.expired_on)}`);
  const metaIcons = metaBits.join(" · ");

  return `
    <div class="job-card expandable ${sev}${itemNew ? ' is-new' : ''}">
      <div class="countdown">
        ${isExpired
          ? `<span class="num">·</span>expired`
          : (days === null ? `<span class="num">${freshnessBadge(j).num}</span>${freshnessBadge(j).label}` :
             `<span class="num">${days}</span>days`)}
      </div>
      <div class="body">
        <div class="title">${newBadge}<a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a></div>
        <div class="employer-row"><b>${esc(j.employer || "")}</b>${j.department ? " · " + esc(j.department) : ""}${j.source_name ? " · via " + esc(j.source_name) : ""} · <span class="stars">${stars(j.llm_fit || 0)}</span></div>
        <div class="expansion">
          ${metaIcons ? `<div class="meta-icons">${metaIcons}</div>` : ""}
          ${sourceHtml(j)}
          ${j.llm_summary ? `<div>${esc(j.llm_summary)}</div>` : ""}
          ${j.llm_reason ? `<div class="reason">🤖 ${esc(j.llm_reason)}</div>` : ""}
        </div>
      </div>
      <div class="chevron">▾</div>
    </div>`;
}

// Event delegation: one listener per list survives re-renders.
function bindListClicks(el) {
  if (!el || el.dataset.bound) return;
  el.dataset.bound = "1";
  el.addEventListener("click", e => {
    if (e.target.closest("a")) return;
    const card = e.target.closest(".job-card");
    if (card) card.classList.toggle("expanded");
  });
}

function sortActive(mode) {
  const sorted = [...ACTIVE];
  const cdKey = j => j.closing_date || "9999-12-31";
  const pdKey = j => j.posted_date || "0000-00-00";
  if (mode === "deadline") {
    sorted.sort((a, b) => cdKey(a).localeCompare(cdKey(b)) ||
                          (b.llm_fit || 0) - (a.llm_fit || 0));
  } else if (mode === "newest") {
    sorted.sort((a, b) => pdKey(b).localeCompare(pdKey(a)) ||
                          (b.llm_fit || 0) - (a.llm_fit || 0));
  } else {
    sorted.sort((a, b) => (b.llm_fit || 0) - (a.llm_fit || 0) ||
                          cdKey(a).localeCompare(cdKey(b)));
  }
  activeEl.innerHTML = sorted.map(j => renderCard(j, false)).join("");
}

const activeEl = document.getElementById("active-list");
const expEl = document.getElementById("expired-list");
if (activeEl) { sortActive("fit"); bindListClicks(activeEl); }
if (expEl) { expEl.innerHTML = EXPIRED.map(j => renderCard(j, true)).join("");
             bindListClicks(expEl); }

const sortTabs = document.getElementById("sort-tabs");
if (sortTabs) {
  sortTabs.addEventListener("click", e => {
    if (e.target.tagName !== "BUTTON") return;
    sortTabs.querySelectorAll("button")
      .forEach(b => b.classList.toggle("active", b === e.target));
    sortActive(e.target.dataset.sort);
  });
}
</script>
