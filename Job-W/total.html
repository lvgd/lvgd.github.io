nal fit kept for breadth.", "llm_fit": 2, "first_seen": "2026-05-14", "emailed_on": null}];
const TODAY = new Date("2026-05-22T00:00:00");

function parseDate(s) { if (!s) return null;
  const d = new Date(s + "T00:00:00"); return isNaN(d) ? null : d; }
function daysUntil(d) { return Math.round((d - TODAY) / 86400000); }
function stars(n) { n = Math.max(0, Math.min(5, n|0));
  return "★".repeat(n) + "☆".repeat(5 - n); }
function esc(s) { if (!s) return ""; return String(s).replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function isNew(postedIso) {
  if (!postedIso) return false;
  const d = parseDate(postedIso);
  if (!d) return false;
  return (TODAY - d) / 86400000 <= 3;
}

function renderCard(j, isExpired) {
  const cd = parseDate(j.closing_date);
  const days = cd ? daysUntil(cd) : null;
  let sev = "", cdLabel = "";
  if (isExpired) {
    sev = "expired";
    cdLabel = j.closing_date || "—";
  } else if (days === null) {
    sev = "safe";
    cdLabel = "—";
  } else if (days <= 7) {
    sev = "";
    cdLabel = `${days}d`;
  } else if (days <= 14) {
    sev = "warn";
    cdLabel = `${days}d`;
  } else {
    sev = "safe";
    cdLabel = `${days}d`;
  }
  const itemNew = !isExpired && isNew(j.posted_date);
  const newBadge = itemNew ? '<span class="new-badge">NEW!</span>' : "";

  const metaBits = [];
  if (j.location) metaBits.push(`📍 ${esc(j.location)}`);
  if (j.salary) metaBits.push(`💷 ${esc(j.salary)}`);
  if (j.posted_date) metaBits.push(`📅 Posted ${esc(j.posted_date)}`);
  if (j.closing_date) metaBits.push(`⏳ Closes ${esc(j.closing_date)}`);
  const metaIcons = metaBits.join(" · ");

  return `
    <div class="job-card expandable ${sev}${itemNew ? ' is-new' : ''}">
      <div class="countdown">
        ${isExpired
          ? `<span class="num">·</span>expired`
          : (days === null ? `<span class="num">·</span>open` :
             `<span class="num">${days}</span>days`)}
      </div>
      <div class="body">
        <div class="title">${newBadge}<a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a></div>
        <div class="employer-row"><b>${esc(j.employer || "")}</b>${j.department ? " · " + esc(j.department) : ""} · <span class="stars">${stars(j.llm_fit || 0)}</span></div>
        <div class="expansion">
          ${metaIcons ? `<div class="meta-icons">${metaIcons}</div>` : ""}
          ${j.llm_summary ? `<div>${esc(j.llm_summary)}</div>` : ""}
          ${j.llm_reason ? `<div class="reason">🤖 ${esc(j.llm_reason)}</div>` : ""}
        </div>
      </div>
      <div class="chevron">▾</div>
    </div>`;
}

// Event delegation: one listener per list survives re-renders.
function bindListClicks(el) {
  if (!el || el.dataset.bound) return;
  el.dataset.bound = "1";
  el.addEventListener("click", e => {
    if (e.target.closest("a")) return;
    const card = e.target.closest(".job-card");
    if (card) card.classList.toggle("expanded");
  });
}

function sortActive(mode) {
  const sorted = [...ACTIVE];
  const cdKey = j => j.closing_date || "9999-12-31";
  const pdKey = j => j.posted_date || "0000-00-00";
  if (mode === "deadline") {
    sorted.sort((a, b) => cdKey(a).localeCompare(cdKey(b)) ||
                          (b.llm_fit || 0) - (a.llm_fit || 0));
  } else if (mode === "newest") {
    sorted.sort((a, b) => pdKey(b).localeCompare(pdKey(a)) ||
                          (b.llm_fit || 0) - (a.llm_fit || 0));
  } else {
    sorted.sort((a, b) => (b.llm_fit || 0) - (a.llm_fit || 0) ||
                          cdKey(a).localeCompare(cdKey(b)));
  }
  activeEl.innerHTML = sorted.map(j => renderCard(j, false)).join("");
}

const activeEl = document.getElementById("active-list");
const expEl = document.getElementById("expired-list");
if (activeEl) { sortActive("fit"); bindListClicks(activeEl); }
if (expEl) { expEl.innerHTML = EXPIRED.map(j => renderCard(j, true)).join("");
             bindListClicks(expEl); }

const sortTabs = document.getElementById("sort-tabs");
if (sortTabs) {
  sortTabs.addEventListener("click", e => {
    if (e.target.tagName !== "BUTTON") return;
    sortTabs.querySelectorAll("button")
      .forEach(b => b.classList.toggle("active", b === e.target));
    sortActive(e.target.dataset.sort);
  });
}
</script>
