<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Open for applications · Job-W</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e6eb;
    --text: #15192a;
    --muted: #6b7280;
    --accent: #0a66c2;
    --accent-soft: #eff6ff;
    --warn: #f59e0b;
    --warn-soft: #fef3c7;
    --danger: #dc2626;
    --danger-soft: #fee2e2;
    --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04);
  }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    line-height: 1.55; font-feature-settings: "tnum" 1; }
  header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    color: #f8fafc; padding: 22px 28px 24px 28px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  header .sub { margin-top: 4px; font-size: 13px; color: #94a3b8; }
  header .back { display: inline-block; color: #94a3b8; font-size: 13px;
    text-decoration: none; margin-bottom: 8px; }
  header .back:hover { color: #f8fafc; }
  main { max-width: 880px; margin: 0 auto; padding: 24px 20px 60px 20px; }
  h2 { font-size: 14px; font-weight: 600; color: var(--muted);
       margin: 0 0 12px 0; letter-spacing: 0.02em; }
  h2 .hint { font-weight: 500; color: #9ca3af; margin-left: 8px;
             font-size: 12px; letter-spacing: 0.04em; }

  /* Job card */
  .job-card { background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid #cbd5e1;
    border-radius: 8px; padding: 14px 16px 14px 14px; margin-bottom: 10px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: border-color 0.12s; cursor: pointer; }
  .job-card:hover { border-color: var(--accent); }
  .job-card.is-new { border-left-color: var(--danger); }
  .job-card.is-new:hover { border-left-color: var(--danger); }
  .job-card .countdown { flex: 0 0 auto; min-width: 58px; text-align: center;
    background: var(--danger-soft); color: var(--danger);
    padding: 8px 6px; border-radius: 8px; font-weight: 700;
    font-size: 11px; line-height: 1.15; }
  .job-card .countdown .num { font-size: 19px; display: block; }
  .job-card.warn .countdown { background: var(--warn-soft); color: var(--warn); }
  .job-card.safe .countdown { background: var(--accent-soft); color: var(--accent); }
  .job-card.expired .countdown { background: #f3f4f6; color: #9ca3af; }
  .job-card .body { flex: 1; min-width: 0; }
  .job-card .title { font-weight: 600; font-size: 15px; line-height: 1.35;
    margin-bottom: 4px; }
  .job-card .title a { color: var(--accent); text-decoration: none; }
  .job-card .title a:hover { text-decoration: underline; }
  .job-card .new-badge { display: inline-block; background: var(--danger);
    color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 0.6px;
    padding: 2px 7px; border-radius: 3px; margin-right: 8px;
    vertical-align: 2px; }
  .job-card.expired .new-badge { display: none; }  /* never NEW! on expired */
  .job-card .employer-row { font-size: 13px; color: var(--text);
    margin-bottom: 2px; line-height: 1.5; }
  .job-card .employer-row b { font-weight: 600; }
  .job-card .meta-icons { font-size: 12px; color: var(--muted);
    line-height: 1.65; margin-bottom: 8px; }
  .job-card .stars { color: var(--warn); }
  .job-card .chevron { flex: 0 0 auto; align-self: center;
    color: var(--muted); font-size: 14px; line-height: 1;
    transition: transform 0.18s ease; user-select: none; padding: 2px 4px; }
  .job-card.expanded .chevron { transform: rotate(180deg); color: var(--accent); }
  .job-card .expansion { display: none; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border); font-size: 13.5px; line-height: 1.6; }
  .job-card.expanded .expansion { display: block; }
  .job-card .expansion .reason { margin-top: 8px; font-style: italic;
    font-size: 12px; color: var(--muted); }
  /* Expired styling — muted gray everywhere */
  .job-card.expired { background: #fafafa; border-left-color: #e5e7eb; }
  .job-card.expired .title a { color: #94a3b8; }
  .job-card.expired .employer-row { color: #9ca3af; }
  .job-card.expired .meta-icons,
  .job-card.expired .meta-icons .stars { color: #b0b6bf; }

  .section-divider { font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 32px 0 14px 0; padding-bottom: 8px;
    border-bottom: 1px solid var(--border); font-weight: 600; }
  .sort-tabs { display: inline-flex; background: #eef2f7; padding: 3px;
    border-radius: 8px; margin-bottom: 12px; }
  .sort-tabs button { all: unset; cursor: pointer; padding: 6px 14px;
    font-size: 13px; font-weight: 500; border-radius: 6px;
    color: var(--muted); transition: all 0.15s; }
  .sort-tabs button.active { background: var(--surface); color: var(--text);
    box-shadow: 0 1px 2px rgba(15,23,42,0.08); }
  .sort-tabs button:hover:not(.active) { color: var(--text); }

  .empty-state { padding: 36px 20px; text-align: center; color: var(--muted);
    background: var(--surface); border: 1px dashed var(--border); border-radius: 10px;
    font-size: 13px; }

  footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 32px; }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">← back to dashboard</a>
  <h1>Open for applications</h1>
  <div class="sub">0 roles still accepting applications</div>
</header>

<main>
    <div class="empty-state">No matching jobs.</div>


  <footer>Auto-generated locally · 2026-05-11 05:20</footer>
</main>

<script>
const ACTIVE = [];
const EXPIRED = [];
const TODAY = new Date("2026-05-11T00:00:00");

function parseDate(s) { if (!s) return null;
  const d = new Date(s + "T00:00:00"); return isNaN(d) ? null : d; }
function daysUntil(d) { return Math.round((d - TODAY) / 86400000); }
function stars(n) { n = Math.max(0, Math.min(5, n|0));
  return "★".repeat(n) + "☆".repeat(5 - n); }
function esc(s) { if (!s) return ""; return String(s).replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function isNew(postedIso) {
  if (!postedIso) return false;
  const d = parseDate(postedIso);
  if (!d) return false;
  return (TODAY - d) / 86400000 <= 3;
}

function renderCard(j, isExpired) {
  const cd = parseDate(j.closing_date);
  const days = cd ? daysUntil(cd) : null;
  let sev = "", cdLabel = "";
  if (isExpired) {
    sev = "expired";
    cdLabel = j.closing_date || "—";
  } else if (days === null) {
    sev = "safe";
    cdLabel = "—";
  } else if (days <= 7) {
    sev = "";
    cdLabel = `${days}d`;
  } else if (days <= 14) {
    sev = "warn";
    cdLabel = `${days}d`;
  } else {
    sev = "safe";
    cdLabel = `${days}d`;
  }
  const itemNew = !isExpired && isNew(j.posted_date);
  const newBadge = itemNew ? '<span class="new-badge">NEW!</span>' : "";

  const metaBits = [];
  if (j.location) metaBits.push(`📍 ${esc(j.location)}`);
  if (j.salary) metaBits.push(`💷 ${esc(j.salary)}`);
  if (j.posted_date) metaBits.push(`📅 Posted ${esc(j.posted_date)}`);
  if (j.closing_date) metaBits.push(`⏳ Closes ${esc(j.closing_date)}`);
  const metaIcons = metaBits.join(" · ");

  return `
    <div class="job-card expandable ${sev}${itemNew ? ' is-new' : ''}">
      <div class="countdown">
        ${isExpired
          ? `<span class="num">·</span>expired`
          : (days === null ? `<span class="num">·</span>open` :
             `<span class="num">${days}</span>days`)}
      </div>
      <div class="body">
        <div class="title">${newBadge}<a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a></div>
        <div class="employer-row"><b>${esc(j.employer || "")}</b>${j.department ? " · " + esc(j.department) : ""} · <span class="stars">${stars(j.llm_fit || 0)}</span></div>
        <div class="expansion">
          ${metaIcons ? `<div class="meta-icons">${metaIcons}</div>` : ""}
          ${j.llm_summary ? `<div>${esc(j.llm_summary)}</div>` : ""}
          ${j.llm_reason ? `<div class="reason">🤖 ${esc(j.llm_reason)}</div>` : ""}
        </div>
      </div>
      <div class="chevron">▾</div>
    </div>`;
}

// Event delegation: one listener per list survives re-renders.
function bindListClicks(el) {
  if (!el || el.dataset.bound) return;
  el.dataset.bound = "1";
  el.addEventListener("click", e => {
    if (e.target.closest("a")) return;
    const card = e.target.closest(".job-card");
    if (card) card.classList.toggle("expanded");
  });
}

function sortActive(mode) {
  const sorted = [...ACTIVE];
  const cdKey = j => j.closing_date || "9999-12-31";
  const pdKey = j => j.posted_date || "0000-00-00";
  if (mode === "deadline") {
    sorted.sort((a, b) => cdKey(a).localeCompare(cdKey(b)) ||
                          (b.llm_fit || 0) - (a.llm_fit || 0));
  } else if (mode === "newest") {
    sorted.sort((a, b) => pdKey(b).localeCompare(pdKey(a)) ||
                          (b.llm_fit || 0) - (a.llm_fit || 0));
  } else {
    sorted.sort((a, b) => (b.llm_fit || 0) - (a.llm_fit || 0) ||
                          cdKey(a).localeCompare(cdKey(b)));
  }
  activeEl.innerHTML = sorted.map(j => renderCard(j, false)).join("");
}

const activeEl = document.getElementById("active-list");
const expEl = document.getElementById("expired-list");
if (activeEl) { sortActive("fit"); bindListClicks(activeEl); }
if (expEl) { expEl.innerHTML = EXPIRED.map(j => renderCard(j, true)).join("");
             bindListClicks(expEl); }

const sortTabs = document.getElementById("sort-tabs");
if (sortTabs) {
  sortTabs.addEventListener("click", e => {
    if (e.target.tagName !== "BUTTON") return;
    sortTabs.querySelectorAll("button")
      .forEach(b => b.classList.toggle("active", b === e.target));
    sortActive(e.target.dataset.sort);
  });
}
</script>
</body>
</html>
