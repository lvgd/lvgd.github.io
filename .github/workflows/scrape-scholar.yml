name: Scrape Google Scholar

on:
  schedule:
    - cron: '17 3 * * *'
    - cron: '17 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python scripts/fetch_scholar.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/citations.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/citations.json
            git commit -m "chore(data): scholar snapshot $(date -u +%F)"
            git push
          else
            echo "No changes to data/citations.json."
          fi
