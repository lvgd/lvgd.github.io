name: Scrape Google Scholar

# Scheduled run disabled: a launchd LaunchAgent on the Mac mini
# (com.lvgd.scholar, scripts/update_scholar.sh) now handles the daily
# refresh. Residential IPs aren't CAPTCHA'd by Scholar the way GitHub's
# data-center IPs are. Keep workflow_dispatch as a manual fallback.
on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python scripts/fetch_scholar.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/citations.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/citations.json
            git commit -m "chore(data): scholar snapshot $(date -u +%F)"
            git push
          else
            echo "No changes to data/citations.json."
          fi
